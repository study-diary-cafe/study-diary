<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>勉強日記</title>
</head>
<body>
  <h1>勉強日記</h1>

  <textarea id="note" placeholder="今日の勉強を書く"></textarea>
  <button onclick="save()">保存</button>

  <h2>記録</h2>
  <p id="output"></p>

  <script>
    function save() {
      let text = document.getElementById("note").value;
      localStorage.setItem("study", text);
      document.getElementById("output").innerText = text;
    }

    document.getElementById("output").innerText =
      localStorage.getItem("study") || "";
  </script>
</body>
</html>
